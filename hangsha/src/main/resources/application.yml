# ==========================================
# common setting
# ==========================================
spring:
  application:
    name: CampusCalendar
  profiles:
    default: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Seoul

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope:
              - name
              - email
            client-name: Naver
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET} # TODO: jwt secret 또한 secret var 설정
  access-expiration-ms: 3600000
  refresh-expiration-ms: 1209600000

auth: # default cookie setting
  refresh-cookie:
    secure: false
    same-site: Lax

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    groups-order: DESC
    operations-sorter: method
    disable-swagger-default-url: true
    display-request-duration: true
  api-docs:
    path: /api-docs


# TODO : 삭제 예정. 이미지 업로드는 외부 스토리지로 모두 마이그레이션 할 것.
upload:
  dir: /data/uploads
  public-base-url: "https://hangsha.site/static"
  max-size-bytes: 10485760

# TODO: 프로퍼티 정상 주입 확인 목적. 배포 완료 시 내리기.
logging:
  level:
    com.team1.hangsha : DEBUG

---
# ==========================================
# local profile setting
# ==========================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3307/campus_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: user
    password: password

oauth2:
  google: # TODO: 로컬 개발 환경에서 클라이언트 쪽으로의 리다이렉션. 우선 임의로 설정. 확인 필요
    redirect-uri: "http://localhost:3000/login/callback/google"
  naver:
    redirect-uri: "http://localhost:3000/login/callback/naver"
  kakao:
    redirect-uri: "http://localhost:3000/login/callback/kakao"

---
# ==========================================
# [API] 3. DEV 프로파일 (개발 서버용)
# ==========================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    # DEV 환경부터는 반드시 환경 변수 주입 강제
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

oauth2:
  google: # TODO : 추후 확인 필요. 정말로 이 리다이렉트 URI가 맞는가?
    redirect-uri: "https://dev-hangsha.wafflestudio.com/login/callback/google"
  naver:
    redirect-uri: "https://dev-hangsha.wafflestudio.com/login/callback/naver"
  kakao:
    redirect-uri: "https://dev-hangsha.wafflestudio.com/login/callback/kakao"


---
# ==========================================
# [API] 4. PROD 프로파일 (실운영 서버용)
# ==========================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

oauth2:
  google:
    redirect-uri: "https://hangsha.wafflestudio.com/login/callback/google"
  naver:
    redirect-uri: "https://hangsha.wafflestudio.com/login/callback/naver"
  kakao:
    redirect-uri: "https://hangsha.wafflestudio.com/login/callback/kakao"
