# ==========================================
# common setting
# ==========================================
spring:
  config:
    import: classpath:application-common.yml
  application:
    name: CampusCalendar
  profiles:
    default: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Seoul

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id:
            client-secret:
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
          naver:
            client-id:
            client-secret:
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope:
              - name
              - email
            client-name: Naver
          kakao:
            client-id:
            client-secret:
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret:
  access-expiration-ms: 3600000
  refresh-expiration-ms: 1209600000


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    groups-order: DESC
    operations-sorter: method
    disable-swagger-default-url: true
    display-request-duration: true
  api-docs:
    path: /api-docs


upload:
  max-size-bytes: 10485760

# TODO: 프로퍼티 정상 주입 확인 목적. 배포 완료 시 내리기.
logging:
  level:
    com.team1.hangsha : DEBUG

test:
---
# ==========================================
# local profile setting
# ==========================================
spring:
  config:
    activate:
      on-profile: local
app:
  oauth2:
    front-redirect-uri: "http://localhost:3000/auth/callback"

auth: # default cookie setting
  refresh-cookie:
    secure: false
    same-site: Lax

---
# ==========================================
# dev
# ==========================================
spring:
  config:
    activate:
      on-profile: dev
app:
  oauth2:
    front-redirect-uri: "https://hangsha-dev.wafflestudio.com/auth/callback"
auth:
  refresh-cookie:
    secure: true
    domain: ".wafflestudio.com"
---
# ==========================================
# prod
# ==========================================
spring:
  config:
    activate:
      on-profile: prod
app:
  oauth2:
    front-redirect-uri: "https://hangsha.wafflestudio.com/auth/callback"
auth:
  refresh-cookie:
    secure: true
    domain: ".wafflestudio.com"