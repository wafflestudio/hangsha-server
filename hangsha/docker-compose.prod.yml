version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: campus-mysql
    environment:
      TZ: Asia/Seoul
      MYSQL_DATABASE: ${DB_NAME:-campus_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASS:-password}
    volumes:
      - campus_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKER_USERNAME}/campus-calendar-server:latest
    container_name: campus-server
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Seoul
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME:-campus_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS:-password}
      UPLOAD_DIR: /data/uploads
      UPLOAD_PUBLIC_BASE_URL: ${UPLOAD_PUBLIC_BASE_URL:-https://hangsha.site/static}
    volumes:
      - /home/ubuntu/hangsha-uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: always

  batch:
    image: ${DOCKER_USERNAME}/campus-calendar-batch:latest
    environment:
      TZ: Asia/Seoul
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME:-campus_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS:-password}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    profiles:
      - batch

volumes:
  campus_mysql_data:
    external: true
    name: 00d2acb4c475bf0e499fbe7fd5e1f6655973da9cdf51e8fdcca17a00a9d5f70c