name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build with Gradle
        working-directory: ./hangsha
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push server image
        uses: docker/build-push-action@v4
        with:
          context: ./hangsha
          file: ./hangsha/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campus-calendar-server:latest

      - name: Build and push batch image
        uses: docker/build-push-action@v4
        with:
          context: ./hangsha
          file: ./hangsha/batch/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campus-calendar-batch:latest

      - name: Upload docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "hangsha/docker-compose.prod.yml"
          target: "/home/ubuntu/campus"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 20m
          script: |
            set -euo pipefail

            APP_DIR=/home/ubuntu/campus
            mkdir -p "$APP_DIR"

            if [ -f "$APP_DIR/hangsha/docker-compose.prod.yml" ]; then
              mv "$APP_DIR/hangsha/docker-compose.prod.yml" "$APP_DIR/docker-compose.prod.yml"
              rm -rf "$APP_DIR/hangsha"
            fi

            if [ -f "/home/ubuntu/.env" ]; then
              cp /home/ubuntu/.env "$APP_DIR/.env"
            fi

            cd "$APP_DIR"

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            export DB_NAME="campus_db"
            export DB_USER="user"
            export DB_PASS="password"
            export DB_ROOT_PASSWORD="root"

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml --profile batch pull batch

            docker compose -f docker-compose.prod.yml ps
            docker logs --tail 200 campus-server || true